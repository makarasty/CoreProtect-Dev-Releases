name: Build CoreProtect

on:
  push:
    branches:
      - master
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout CoreProtect repository
        uses: actions/checkout@v4
        with:
          repository: PlayPro/CoreProtect
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Fix branch error
        run: |
          echo "branch: development" >> src/main/resources/plugin.yml

      - name: Build with Maven
        run: mvn -B clean package

      - name: Upload CoreProtect Jar
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect Jar
          path: target/CoreProtect-*.jar
          
      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT
        
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.date.outputs.date }}
          name: "Dev Build ${{ steps.date.outputs.date }}"
          body: "Automated build from GitHub repository."
          draft: false
          prerelease: false
          artifacts: target/CoreProtect-*.jar
